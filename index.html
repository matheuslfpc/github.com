
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LeadForge - Sistema de Leads</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    background: #0f172a;
    color: white;
}

header {
    background: linear-gradient(90deg,#2563eb,#1e40af);
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    width: 200px;
}

button {
    background: #2563eb;
    color: white;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #374151;
    text-align: left;
}
</style>

</head>

<body>

<header>
LeadForge - Sistema de Gestão de Leads
</header>

<div class="container">

<div class="card">

<h2>Cadastrar Lead</h2>

<input id="nome" placeholder="Nome">
<input id="empresa" placeholder="Empresa">

<select id="status">
<option>Novo</option>
<option>Contato feito</option>
<option>Follow-up</option>
<option>Interessado</option>
<option>Cliente</option>
<option>Perdido</option>
</select>

<button onclick="adicionarLead()">Salvar Lead</button>

</div>

<div class="card">

<h2>Lista de Leads</h2>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Empresa</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="lista">

</tbody>

</table>

</div>

</div>

<script>

let leads = JSON.parse(localStorage.getItem("leads")) || [];

function salvar() {
    localStorage.setItem("leads", JSON.stringify(leads));
}

function adicionarLead() {

    let nome = document.getElementById("nome").value;
    let empresa = document.getElementById("empresa").value;
    let status = document.getElementById("status").value;

    if(nome === "") return;

    leads.push({
        nome,
        empresa,
        status
    });

    salvar();
    atualizar();
}

function excluir(index) {
    leads.splice(index,1);
    salvar();
    atualizar();
}

function atualizar() {

    let tabela = document.getElementById("lista");

    tabela.innerHTML = "";

    leads.forEach((lead,index)=>{

        tabela.innerHTML += `
        <tr>
            <td>${lead.nome}</td>
            <td>${lead.empresa}</td>
            <td>${lead.status}</td>
            <td>
                <button onclick="excluir(${index})">
                Excluir
                </button>
            </td>
        </tr>
        `;

    });

}

atualizar();

</script>

</body>
</html>
